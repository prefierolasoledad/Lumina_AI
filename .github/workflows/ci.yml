# Continuous Integration for Lumina AI
#
# Runs automatically on every push to `main` and on every pull request.
# Two independent jobs run in parallel — one per app — so a failure in one
# doesn't hide results from the other. Each job spins up a fresh Ubuntu VM,
# installs dependencies, then verifies the code compiles / lints / tests.
#
# This is CI only: it proves the code is healthy. It does NOT deploy anything.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      # 1. Pull the repo onto the runner.
      - uses: actions/checkout@v4

      # 2. Install Node 20 (matches the Dockerfiles) and cache npm downloads
      #    so repeat runs are faster.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      # 3. Clean, reproducible install straight from the lock file.
      - run: npm ci

      # 4. Type-check + compile TypeScript -> dist (this is `tsc`).
      - run: npm run build

      # 5. Run the unit tests.
      - run: npm test

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # Static analysis. This is now a HARD GATE: any lint error fails the
      # build. Noisy stylistic rules (no-explicit-any, set-state-in-effect)
      # are downgraded to warnings in eslint.config.mjs, so they still show
      # up in the logs but don't block CI.
      - run: npm run lint

      # Full production build. NEXT_PUBLIC_* values are inlined at build time;
      # these mirror the defaults in frontend/Dockerfile so the build matches
      # what ships. They only need to be syntactically valid here — no real
      # backend is contacted during the build.
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
          NEXT_PUBLIC_WS_URL: ws://localhost:5000
          NEXT_TELEMETRY_DISABLED: "1"

  # Verifies the production Docker images actually build from the Dockerfiles.
  # `needs: [backend, frontend]` makes this job wait until both code-check jobs
  # pass — no point building images if the code doesn't compile. This turns the
  # pipeline into two stages: (1) backend + frontend in parallel, then (2) docker.
  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships with Docker preinstalled, so we can build directly.
      # We only BUILD here (no push) — this just proves the Dockerfiles are valid.
      - name: Build backend image
        run: docker build -t lumina-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t lumina-frontend:ci ./frontend
